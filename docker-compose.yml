services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      DJANGO_SECRET_KEY: "change-this-before-production"
      DATABASE_URL: "postgresql://wiki:wiki@db:5432/wiki"
      SITE_TITLE: "Title:Placeholder"
    volumes:
      - wiki_media:/app/media
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: wiki
      POSTGRES_USER: wiki
      POSTGRES_PASSWORD: wiki
    volumes:
      - wiki_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wiki"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  wiki_db:
  wiki_media:
