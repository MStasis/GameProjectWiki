<!doctype html>
<html lang="ko" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#070a12" />
    <meta name="color-scheme" content="dark" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: blob:; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://*.ts.net; frame-src https://www.youtube-nocookie.com https://docs.google.com; object-src 'none'; base-uri 'none'; frame-ancestors 'none'" />
    <meta name="description" content="오프라인에서 기록하고 집에서 동기화하는 개인용 게임 프로젝트 위키" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Title:Placeholder · Local Archive</title>
    <link rel="manifest" href="./manifest.webmanifest" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">본문으로 건너뛰기</a>

    <div class="site-atmosphere" aria-hidden="true">
      <span class="site-atmosphere__rift"></span>
      <span class="site-atmosphere__grid"></span>
      <span class="site-atmosphere__signal"></span>
    </div>

    <div id="app" class="app-boot" aria-busy="true">
      <div class="boot-mark" aria-hidden="true"><i></i></div>
      <p>LOCAL ARCHIVE INITIALIZING</p>
      <span>기기 저장소를 확인하고 있습니다…</span>
    </div>

    <noscript>
      <main class="noscript-card">
        <h1>JavaScript가 필요합니다</h1>
        <p>이 위키는 기기 안에 문서를 저장하고 동기화하기 위해 JavaScript를 사용합니다.</p>
      </main>
    </noscript>

    <div id="live-announcer" class="sr-only" aria-live="polite" aria-atomic="true"></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
